<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Isekai Life</title>

<style>

body{
margin:0;
font-family:system-ui;
background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1519681393784-d120267933ba");
background-size:cover;
color:white;
display:flex;
justify-content:center;
padding:40px;
}

#game{
width:760px;
}

.card{
background:rgba(25,25,25,0.8);
padding:20px;
border-radius:12px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,0.07);
}

button{
background:#2e2e2e;
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
margin:4px;
cursor:pointer;
}

button:hover{
background:#444;
}

.bar{
height:8px;
background:#333;
border-radius:4px;
margin-bottom:6px;
}

.fill{
height:8px;
background:#67ff8d;
border-radius:4px;
}

#version{
position:fixed;
bottom:8px;
right:12px;
opacity:0.6;
font-size:12px;
}

</style>
</head>

<body>

<div id="game"></div>
<div id="version">Isekai Life v3.0</div>

<script>

let player = {

name:"Arion",
age:0,
class:"",
hp:100,
gold:20,
reputation:0,
memory:0,

stats:{
strength:5,
intelligence:5,
charisma:5,
luck:5,
mana:3
},

inventory:[],
relationships:[],
job:null

}

const classes=[
"Camponês",
"Mercador",
"Filho de ferreiro",
"Nobre menor",
"Órfão"
]

const items=[
{name:"Espada",type:"weapon",power:5},
{name:"Adaga",type:"weapon",power:3},
{name:"Poção",type:"heal",value:20},
{name:"Livro mágico",type:"magic",power:3}
]

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function start(){

player.class=classes[rand(0,classes.length-1)]

render()

event("Você reencarnou no mundo de Elyndar como "+player.class)

}

function render(){

document.getElementById("game").innerHTML=`

<div class="card">

<h1>Isekai Life</h1>

${player.name} • idade ${player.age} • ${player.class}

<br><br>

❤️ Vida ${player.hp}

<br>

💰 Ouro ${player.gold}

<br>

⭐ Reputação ${player.reputation}

<br><br>

Força
<div class="bar"><div class="fill" style="width:${player.stats.strength*10}%"></div></div>

Inteligência
<div class="bar"><div class="fill" style="width:${player.stats.intelligence*10}%"></div></div>

Carisma
<div class="bar"><div class="fill" style="width:${player.stats.charisma*10}%"></div></div>

Sorte
<div class="bar"><div class="fill" style="width:${player.stats.luck*10}%"></div></div>

Mana
<div class="bar"><div class="fill" style="width:${player.stats.mana*10}%"></div></div>

</div>

<div class="card">

<button onclick="nextYear()">Avançar Ano</button>

<button onclick="explore()">Explorar</button>

<button onclick="work()">Trabalhar</button>

<button onclick="social()">Social</button>

<button onclick="inventory()">Inventário</button>

<button onclick="rest()">Descansar</button>

</div>

<div class="card" id="event"></div>

`

}

function event(text,choices=[]){

let html="<p>"+text+"</p>"

choices.forEach(c=>{
html+=`<button onclick="${c.action}">${c.text}</button>`
})

document.getElementById("event").innerHTML=html

}

function nextYear(){

player.age++

lifeEvent()

render()

}

function lifeEvent(){

let r=rand(1,100)

if(r<25) romanceEvent()
else if(r<45) adventureEvent()
else if(r<60) goldEvent()
else if(r<75) memoryEvent()
else if(r<90) statEvent()
else calmEvent()

}

function romanceEvent(){

let name="Lyria"

event(

"Você conheceu "+name+" no mercado.",

[
{text:"Conversar",action:"dateStart()"},
{text:"Ignorar",action:"render()"}
]

)

}

function dateStart(){

player.relationships.push("Lyria")

player.reputation+=1

event("Vocês começaram a se conhecer melhor.")

}

function adventureEvent(){

let damage=rand(5,20)

player.hp-=damage

player.gold+=rand(5,25)

if(player.hp<=0){

event("Você morreu em uma aventura... renascendo.")

setTimeout(start,2000)

return

}

event("Você enfrentou um monstro e perdeu "+damage+" de vida.")

}

function goldEvent(){

let g=rand(10,30)

player.gold+=g

event("Você fez um bom negócio e ganhou "+g+" moedas.")

}

function memoryEvent(){

player.memory++

player.stats.intelligence++

event("Memórias do mundo moderno surgem... você tem uma nova ideia.")

}

function statEvent(){

let s=["strength","intelligence","charisma","luck"]

let stat=s[rand(0,s.length-1)]

player.stats[stat]++

event("Sua habilidade de "+stat+" melhorou.")

}

function calmEvent(){

event("Um ano tranquilo se passou.")

}

function explore(){

let item=items[rand(0,items.length-1)]

player.inventory.push(item)

event("Você encontrou "+item.name)

}

function work(){

let income=rand(10,25)

player.gold+=income

event("Você trabalhou e ganhou "+income+" moedas.")

}

function social(){

if(player.relationships.length==0){

event("Você não tem muitos amigos ainda.")

return

}

event("Você passou tempo com "+player.relationships[0])

}

function rest(){

let heal=rand(10,20)

player.hp+=heal

if(player.hp>100) player.hp=100

event("Você descansou e recuperou "+heal+" de vida.")

}

function inventory(){

let text="<b>Inventário</b><br><br>"

if(player.inventory.length==0){

text+="vazio"

}else{

player.inventory.forEach(i=>{
text+=i.name+"<br>"
})

}

event(text)

}

start()

</script>

</body>
</html>
