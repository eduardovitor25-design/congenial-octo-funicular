<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Isekai Life</title>

<style>

body{
background:#111;
color:#eaeaea;
font-family:system-ui;
display:flex;
justify-content:center;
padding:40px;
}

#game{
width:700px;
}

.card{
background:#1b1b1b;
padding:20px;
border-radius:8px;
margin-bottom:15px;
}

h1{
font-weight:300;
}

button{
background:#2b2b2b;
border:none;
color:white;
padding:10px 15px;
margin:4px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3b3b3b;
}

.bar{
height:8px;
background:#333;
margin-bottom:6px;
border-radius:4px;
}

.fill{
height:8px;
background:#6be675;
border-radius:4px;
}

.stat{
font-size:12px;
opacity:0.7;
}

.small{
font-size:12px;
opacity:0.6;
}

</style>
</head>

<body>

<div id="game"></div>

<script>

let player = {

name:"",

age:0,

class:"",

gold:10,

stats:{
strength:5,
intelligence:5,
charisma:5,
luck:5,
mana:3
},

inventory:[],

memoryLevel:0

}

const items = [

{name:"Espada velha",type:"weapon",power:2},
{name:"Adaga",type:"weapon",power:1},
{name:"Livro antigo",type:"knowledge",power:2},
{name:"Anel estranho",type:"artifact",power:3},
{name:"Poção misteriosa",type:"potion",power:2}

]

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

function start(){

player.name="Arion"

player.age=0

player.class=randomClass()

player.stats.strength=rand(3,7)
player.stats.intelligence=rand(3,7)
player.stats.charisma=rand(3,7)
player.stats.luck=rand(3,7)
player.stats.mana=rand(1,5)

render()

event("Você reencarnou no mundo de Elyndar.")

}

function randomClass(){

let c=[
"Camponês",
"Filho de ferreiro",
"Filho de mercador",
"Nobre menor",
"Órfão"
]

return c[rand(0,c.length-1)]

}

function render(){

document.getElementById("game").innerHTML=`

<div class="card">

<h1>Isekai Life</h1>

<div class="small">
${player.name} • idade ${player.age} • ${player.class}
</div>

<br>

<div class="stat">Força</div>
<div class="bar"><div class="fill" style="width:${player.stats.strength*10}%"></div></div>

<div class="stat">Inteligência</div>
<div class="bar"><div class="fill" style="width:${player.stats.intelligence*10}%"></div></div>

<div class="stat">Carisma</div>
<div class="bar"><div class="fill" style="width:${player.stats.charisma*10}%"></div></div>

<div class="stat">Sorte</div>
<div class="bar"><div class="fill" style="width:${player.stats.luck*10}%"></div></div>

<div class="stat">Mana</div>
<div class="bar"><div class="fill" style="width:${player.stats.mana*10}%"></div></div>

<br>

Ouro: ${player.gold}

</div>

<div class="card">

<button onclick="nextYear()">Avançar ano</button>
<button onclick="showInventory()">Inventário</button>
<button onclick="training()">Treinar</button>

</div>

<div class="card" id="event"></div>

`

}

function event(text,choices=[]){

let html=`<p>${text}</p>`

choices.forEach(c=>{
html+=`<button onclick="${c.action}">${c.text}</button>`
})

document.getElementById("event").innerHTML=html

}

function nextYear(){

player.age++

proceduralEvent()

render()

}

function proceduralEvent(){

let score =
player.stats.intelligence +
player.stats.luck +
player.memoryLevel

let roll=rand(1,100)

if(roll<25){

findItem()

}

else if(roll<45){

goldEvent()

}

else if(roll<65){

isekaiMemory()

}

else if(roll<85){

statEvent()

}

else{

nothingEvent()

}

}

function findItem(){

let item=items[rand(0,items.length-1)]

player.inventory.push(item)

event(

"Você encontrou: "+item.name,

[
{text:"Guardar",action:"render()"},
{text:"Vender",action:`sellItem("${item.name}")`}
]

)

}

function sellItem(name){

player.gold+=rand(5,15)

player.inventory=player.inventory.filter(i=>i.name!=name)

render()

}

function goldEvent(){

let g=rand(5,20)

player.gold+=g

event("Você ganhou "+g+" moedas.")

}

function statEvent(){

let stats=["strength","intelligence","charisma","luck"]

let s=stats[rand(0,stats.length-1)]

player.stats[s]+=1

event("Você melhorou sua habilidade de "+s)

}

function isekaiMemory(){

if(rand(1,100)<50){

player.memoryLevel++

player.stats.intelligence++

event(

"Uma memória do mundo moderno retorna. Você tem uma nova ideia."

)

}else{

event("Você quase lembra algo do outro mundo... mas desaparece.")

}

}

function nothingEvent(){

event("Um ano tranquilo se passa.")

}

function training(){

event(

"O que deseja treinar?",

[
{text:"Força",action:"trainStat('strength')"},
{text:"Inteligência",action:"trainStat('intelligence')"},
{text:"Mana",action:"trainStat('mana')"}
]

)

}

function trainStat(s){

player.stats[s]+=1

render()

}

function showInventory(){

let text="Inventário:<br><br>"

if(player.inventory.length==0){

text+="vazio"

}else{

player.inventory.forEach(i=>{
text+=i.name+"<br>"
})

}

event(text)

}

start()

</script>

</body>
</html>
