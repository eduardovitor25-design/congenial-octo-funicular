<!-- Substitua/adicione este script no final do index.html -->
<script>
const API_PATH = "/api/narrate"; // ajuste se backend estiver em outro host
const TIMEOUT_MS = 12000;
let sessionId = localStorage.getItem("isekai_session") || ("s_"+Math.random().toString(36).slice(2,10));
localStorage.setItem("isekai_session", sessionId);

// small safety: escape HTML function (already present in código maior)
function escapeHtml(s){ return (s+"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

function appendMessage(who, text){
  const s = document.getElementById("story");
  const block = document.createElement("div");
  block.className = "msg";
  block.innerHTML = `<div class="who">${escapeHtml(who)}</div><div class="text">${escapeHtml(text)}</div>`;
  s.appendChild(block);
  s.scrollTop = s.scrollHeight;
  // persist minimal history
  try {
    const h = JSON.parse(localStorage.getItem("isekai_history")||"[]");
    h.push({who,text,time:Date.now()});
    localStorage.setItem("isekai_history", JSON.stringify(h.slice(-120)));
  } catch(e){}
}

function setProcessing(on){
  const btn = document.getElementById("sendBtn");
  const input = document.getElementById("playerInput");
  btn.disabled = on;
  input.disabled = on;
  if(on){
    if(!document.getElementById("procSpinner")){
      const sp = document.createElement("span"); sp.id="procSpinner"; sp.className="spinner";
      btn.appendChild(sp);
    }
  } else {
    const sp = document.getElementById("procSpinner"); if(sp) sp.remove();
  }
}

// send action -> server; fallback if anything fails
async function sendAction(actionText){
  if(!actionText) return;
  appendMessage("Você", actionText);
  setProcessing(true);
  const forceFallback = document.getElementById("forceFallback")?.checked;
  try{
    if(forceFallback){
      // simple fallback here
      const out = localFallback(actionText);
      applyNarrative(out);
      return;
    }
    const payload = { sessionId, action: actionText, context: { recent: getRecentStory(12) } };
    const controller = new AbortController();
    const timeoutId = setTimeout(()=> controller.abort(), TIMEOUT_MS);
    const res = await fetch(API_PATH, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload), signal: controller.signal });
    clearTimeout(timeoutId);
    if(!res.ok){
      console.warn("API non-ok:", res.status);
      const out = localFallback(actionText);
      applyNarrative(out);
      return;
    }
    const data = await res.json();
    applyNarrative(data);
  }catch(err){
    console.warn("Network/API fail -> fallback", err);
    const out = localFallback(actionText);
    applyNarrative(out);
  } finally {
    setProcessing(false);
  }
}

function applyNarrative(data){
  // data: { narrative, choices, updates, npc }
  if(typeof data === "string") data = { narrative: data };
  if(data.narrative) appendMessage("Narrador", data.narrative);
  if(data.npc) appendMessage(data.npc.name || "NPC", data.npc.text || "");
  if(Array.isArray(data.choices) && data.choices.length){
    const s = document.getElementById("story");
    const block = document.createElement("div"); block.className="msg";
    block.innerHTML = `<div class="who">Escolhas</div>`;
    const inner = document.createElement("div"); inner.className="text";
    data.choices.forEach(c => {
      const ch = document.createElement("span"); ch.className="choice"; ch.textContent = c.text;
      ch.onclick = ()=> { sendAction(c.text); };
      inner.appendChild(ch);
    });
    block.appendChild(inner); s.appendChild(block); s.scrollTop = s.scrollHeight;
  }
  // apply updates defensivamente
  if(data.updates){
    if(typeof data.updates.hp === "number"){
      const hpEl = document.getElementById("hp");
      const fill = document.getElementById("hpFill");
      // clamp and update state: front-end expects to track state; if you have state object, update there
      const newHp = Math.max(0, Math.min(300, Number(data.updates.hp) + Number(hpEl?.textContent || 0)));
      if(hpEl) hpEl.textContent = newHp;
      if(fill) fill.style.width = Math.min(100, (newHp/3)) + "%";
    }
    if(typeof data.updates.gold === "number"){
      const goldEl = document.getElementById("gold");
      if(goldEl) goldEl.textContent = Number(goldEl.textContent || 0) + data.updates.gold;
    }
  }
}

// tiny fallback parser for immediate responses (keeps NPCs, diversity)
function localFallback(text){
  const t = (text||"").toLowerCase();
  if(t.includes("vai embora") || t.includes("sai") || t.includes("adeus")){
    return { narrative: "Leo observa por um momento, depois vira as costas e some entre as árvores.", choices:[{text:"Seguir sozinho"},{text:"Voltar ao acampamento"}], updates:{} };
  }
  if(t.includes("renascer") || t.includes("reencarno") || t.includes("reencarno")){
    // reset story signal
    return { narrative: "Você sente a realidade rasgar — tudo escurece e quando abre os olhos, é outro mundo.", choices:[{text:"Olhar ao redor"},{text:"Levantar-se"}], updates:{ hp: 100 } };
  }
  // default varied templates
  const templates = [
    "O vento carrega um cheiro de fumaça. Algo se move entre as árvores.",
    "Uma sensação estranha percorre suas costas. Você tem a impressão de que algo te observa.",
    "Leo apóia a mão na lança e diz: 'Cuidado com o que procura.'"
  ];
  return { narrative: templates[Math.floor(Math.random()*templates.length)], choices:[{text:"Investigar"},{text:"Seguir"}], updates:{} };
}

function getRecentStory(n=12){
  try{ const h = JSON.parse(localStorage.getItem("isekai_history")||"[]"); return h.slice(-n).map(x=>`${x.who}: ${x.text}`); }catch(e){ return []; }
}

// reset world button
function resetWorld(){
  localStorage.removeItem("isekai_history");
  // optionally call server to reset session (if implemented)
  appendMessage("Sistema","Mundo reiniciado. Você reencarna em outro lugar.");
}

// hookup: input, send button, extra actions
document.getElementById("sendBtn").addEventListener("click", ()=> {
  const txt = document.getElementById("playerInput").value.trim();
  if(!txt) return;
  document.getElementById("playerInput").value = "";
  sendAction(txt);
});
document.getElementById("playerInput").addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); document.getElementById("sendBtn").click(); }});

// expose reset button (create in UI if you want)
window.resetWorld = resetWorld;

</script>
