<!DOCTYPE html>
<html>
<head>

<title>Isekai Life 3.0</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

#story{
height:400px;
overflow:auto;
border:1px solid #444;
padding:10px;
margin-bottom:10px;
}

#input{
width:80%;
padding:10px;
}

button{
padding:10px;
}

</style>

</head>

<body>

<h2>Isekai Life</h2>

<div id="story"></div>

<input id="input" placeholder="Escreva sua ação..." />
<button onclick="send()">Enviar</button>

<script>

let history = ""

function add(text){

const story = document.getElementById("story")

story.innerHTML += "<p>"+text+"</p>"

story.scrollTop = story.scrollHeight

history += text + "\n"

}

add("Narrador: Você reencarna em um mundo desconhecido...")

async function send(){

const input = document.getElementById("input")

const message = input.value

input.value=""

add("<b>Garuk:</b> "+message)

const res = await fetch("/ai",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:message,
history:history
})
})

const data = await res.json()

add("<b>Narrador:</b> "+data.reply)

}

</script>

</body>
</html>
