<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Isekai Life</title>

<style>
body{
background:#1b1b1b;
color:white;
font-family:Arial;
text-align:center;
}

.container{
width:600px;
margin:auto;
background:#2b2b2b;
padding:20px;
border-radius:10px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:5px;
background:#3c8cff;
color:white;
cursor:pointer;
}

button:hover{
background:#2a6adf;
}

.bar{
height:15px;
background:#444;
margin:5px;
border-radius:5px;
}

.fill{
height:15px;
background:#3cff8f;
border-radius:5px;
}

.event{
background:#333;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.version{
position:fixed;
bottom:5px;
right:10px;
font-size:10px;
opacity:0.5;
}
</style>
</head>

<body>

<div class="container">

<h1>Isekai Life</h1>

<div id="game"></div>

</div>

<div class="version">v1.0</div>

<script>

let player = {
nome:"",
idade:0,
classe:"",
forca:0,
inteligencia:0,
carisma:0,
sorte:0,
mana:0,
ouro:10,
inventario:[],
relacoes:{
pai:50,
mae:50
}
}

function startGame(){

document.getElementById("game").innerHTML=`

<h2>Você morreu no mundo moderno...</h2>

<p>Uma entidade oferece reencarnação em Elyndar.</p>

<button onclick="reencarnar()">Reencarnar</button>

`
}

function reencarnar(){

let classes=["Camponês","Filho de Ferreiro","Filho de Mercador","Nobre Menor","Órfão"]

player.classe=classes[Math.floor(Math.random()*classes.length)]

player.idade=0

player.forca=rand(2,6)
player.inteligencia=rand(2,6)
player.carisma=rand(2,6)
player.sorte=rand(2,6)
player.mana=rand(1,5)

player.nome="Arion"

mostrarStatus()

}

function mostrarStatus(){

document.getElementById("game").innerHTML=`

<h2>${player.nome}</h2>

<p>Idade: ${player.idade}</p>
<p>Classe: ${player.classe}</p>

<p>Ouro: ${player.ouro}</p>

<h3>Atributos</h3>

Força
<div class="bar"><div class="fill" style="width:${player.forca*10}%"></div></div>

Inteligência
<div class="bar"><div class="fill" style="width:${player.inteligencia*10}%"></div></div>

Carisma
<div class="bar"><div class="fill" style="width:${player.carisma*10}%"></div></div>

Sorte
<div class="bar"><div class="fill" style="width:${player.sorte*10}%"></div></div>

Mana
<div class="bar"><div class="fill" style="width:${player.mana*10}%"></div></div>

<br>

<button onclick="avancarIdade()">Avançar 1 ano</button>
<button onclick="verInventario()">Inventário</button>
<button onclick="verRelacoes()">Relações</button>

<div id="eventos"></div>

`

}

function avancarIdade(){

player.idade++

eventoAleatorio()

}

function eventoAleatorio(){

let eventos=[eventoEspada,eventoMemoria,eventoOuro,eventoTreino]

let e = eventos[Math.floor(Math.random()*eventos.length)]

e()

}

function eventoEspada(){

document.getElementById("eventos").innerHTML=`

<div class="event">

Você encontrou uma espada velha no celeiro.

<br><br>

<button onclick="pegarEspada()">Ficar com ela</button>

<button onclick="venderEspada()">Vender por 5 ouro</button>

</div>

`

}

function pegarEspada(){

player.inventario.push("Espada velha")

player.forca+=1

mostrarStatus()

}

function venderEspada(){

player.ouro+=5

mostrarStatus()

}

function eventoMemoria(){

document.getElementById("eventos").innerHTML=`

<div class="event">

Uma memória do mundo moderno surge...

Você lembra de algo sobre tecnologia.

<br><br>

<button onclick="ideiaPolvora()">Tentar criar pólvora</button>

<button onclick="ignorar()">Ignorar</button>

</div>

`

}

function ideiaPolvora(){

if(player.inteligencia>4){

player.ouro+=20

alert("Você criou algo útil e vendeu a ideia!")

}else{

alert("Você falhou miseravelmente.")

}

mostrarStatus()

}

function ignorar(){

mostrarStatus()

}

function eventoOuro(){

let valor=rand(3,10)

player.ouro+=valor

alert("Você encontrou "+valor+" moedas!")

mostrarStatus()

}

function eventoTreino(){

document.getElementById("eventos").innerHTML=`

<div class="event">

Você quer treinar algo.

<br><br>

<button onclick="treinarForca()">Treinar força</button>
<button onclick="estudar()">Estudar</button>

</div>

`

}

function treinarForca(){

player.forca++

mostrarStatus()

}

function estudar(){

player.inteligencia++

mostrarStatus()

}

function verInventario(){

alert("Inventário: "+player.inventario.join(", "))

}

function verRelacoes(){

alert("Pai: "+player.relacoes.pai+" | Mãe: "+player.relacoes.mae)

}

function rand(min,max){

return Math.floor(Math.random()*(max-min+1))+min

}

startGame()

</script>

</body>
</html>
