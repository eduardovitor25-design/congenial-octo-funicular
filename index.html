<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Isekai Life</title>

<style>

body{

margin:0;

font-family:system-ui;

background:
linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.85)),
url("https://images.unsplash.com/photo-1503264116251-35a269479413");

background-size:cover;

background-attachment:fixed;

color:white;

display:flex;

justify-content:center;

padding:40px;

}

#game{

width:720px;

}

.card{

background:rgba(20,20,20,0.75);

backdrop-filter:blur(6px);

border-radius:12px;

padding:20px;

margin-bottom:14px;

border:1px solid rgba(255,255,255,0.08);

box-shadow:0 8px 20px rgba(0,0,0,0.6);

}

h1{

font-weight:300;

letter-spacing:1px;

}

button{

background:#2d2d2d;

border:none;

padding:10px 14px;

border-radius:6px;

color:white;

margin:4px;

cursor:pointer;

transition:0.2s;

}

button:hover{

background:#3e3e3e;

}

.bar{

height:8px;

background:#333;

border-radius:4px;

margin-bottom:8px;

}

.fill{

height:8px;

background:#67ff8d;

border-radius:4px;

}

.stat{

font-size:12px;

opacity:0.8;

}

#version{

position:fixed;

bottom:8px;

right:12px;

opacity:0.6;

font-size:12px;

}

</style>
</head>

<body>

<div id="game"></div>

<div id="version">version 2.0</div>

<script>

let player = {

name:"Arion",

age:0,

class:"",

hp:100,

gold:10,

memory:0,

stats:{

strength:5,

intelligence:5,

charisma:5,

luck:5,

mana:3

},

inventory:[]

}

const classes=[

"Camponês",

"Filho de ferreiro",

"Mercador",

"Nobre menor",

"Órfão"

]

const items=[

{name:"Espada velha",power:3},

{name:"Adaga",power:2},

{name:"Livro antigo",power:2},

{name:"Anel mágico",power:4},

{name:"Poção de cura",heal:20}

]

function rand(min,max){

return Math.floor(Math.random()*(max-min+1))+min

}

function start(){

player.class=classes[rand(0,classes.length-1)]

player.stats.strength=rand(3,7)

player.stats.intelligence=rand(3,7)

player.stats.charisma=rand(3,7)

player.stats.luck=rand(3,7)

player.stats.mana=rand(1,5)

render()

event("Você reencarnou no mundo de Elyndar.")

}

function render(){

document.getElementById("game").innerHTML=`

<div class="card">

<h1>Isekai Life</h1>

${player.name} • idade ${player.age} • ${player.class}

<br><br>

❤️ Vida: ${player.hp}

<br>

💰 Ouro: ${player.gold}

<br><br>

<div class="stat">Força</div>
<div class="bar"><div class="fill" style="width:${player.stats.strength*10}%"></div></div>

<div class="stat">Inteligência</div>
<div class="bar"><div class="fill" style="width:${player.stats.intelligence*10}%"></div></div>

<div class="stat">Carisma</div>
<div class="bar"><div class="fill" style="width:${player.stats.charisma*10}%"></div></div>

<div class="stat">Sorte</div>
<div class="bar"><div class="fill" style="width:${player.stats.luck*10}%"></div></div>

<div class="stat">Mana</div>
<div class="bar"><div class="fill" style="width:${player.stats.mana*10}%"></div></div>

</div>

<div class="card">

<button onclick="nextYear()">Avançar Ano</button>

<button onclick="train()">Treinar</button>

<button onclick="showInventory()">Inventário</button>

<button onclick="rest()">Descansar</button>

</div>

<div class="card" id="event"></div>

`

}

function event(text,choices=[]){

let html=`<p>${text}</p>`

choices.forEach(c=>{

html+=`<button onclick="${c.action}">${c.text}</button>`

})

document.getElementById("event").innerHTML=html

}

function nextYear(){

player.age++

procedural()

render()

}

function procedural(){

let roll=rand(1,100)

if(roll<20) findItem()

else if(roll<40) goldEvent()

else if(roll<60) memoryEvent()

else if(roll<75) monsterEvent()

else if(roll<90) statEvent()

else calmEvent()

}

function findItem(){

let item=items[rand(0,items.length-1)]

player.inventory.push(item)

event("Você encontrou "+item.name)

}

function goldEvent(){

let g=rand(5,20)

player.gold+=g

event("Você encontrou "+g+" moedas.")

}

function statEvent(){

let s=["strength","intelligence","charisma","luck"]

let chosen=s[rand(0,s.length-1)]

player.stats[chosen]+=1

event("Você melhorou "+chosen)

}

function calmEvent(){

event("Um ano tranquilo se passou.")

}

function memoryEvent(){

if(rand(1,100)<60){

player.memory++

player.stats.intelligence++

event("Memórias do mundo moderno voltam. Você tem uma nova ideia.")

}else{

event("Você quase lembra algo do outro mundo.")

}

}

function monsterEvent(){

let damage=rand(5,20)

player.hp-=damage

if(player.hp<=0){

event("Você morreu em combate... reiniciando.")

setTimeout(start,2000)

return

}

event("Você lutou contra um monstro e perdeu "+damage+" de vida.")

}

function train(){

event(

"O que deseja treinar?",

[

{text:"Força",action:"trainStat('strength')"},

{text:"Inteligência",action:"trainStat('intelligence')"},

{text:"Mana",action:"trainStat('mana')"}

]

)

}

function trainStat(s){

player.stats[s]+=1

render()

}

function rest(){

let heal=rand(10,25)

player.hp+=heal

if(player.hp>100) player.hp=100

event("Você descansou e recuperou "+heal+" de vida.")

}

function showInventory(){

let text="<b>Inventário</b><br><br>"

if(player.inventory.length==0){

text+="vazio"

}else{

player.inventory.forEach(i=>{

text+=i.name+"<br>"

})

}

event(text)

}

start()

</script>

</body>
</html>
