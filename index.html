<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Crônicas de Eldoria — Rimlike Proto</title>
<style>
body{
background:#0f0e0c;
color:#e6dcc6;
font-family:Georgia,serif;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
}
h1{color:#c6a85a;margin:10px;}
#game{
display:flex;
gap:20px;
}
#map{
display:grid;
grid-template-columns:repeat(20,32px);
grid-template-rows:repeat(20,32px);
gap:1px;
background:#222;
}
.tile{
width:32px;height:32px;
display:flex;align-items:center;justify-content:center;
font-size:18px;
}
.grass{background:#2c3e2c;}
.tree{background:#1c2a1c;}
.player{background:#c6a85a;}
.enemy{background:#7a1f1f;}
.item{background:#444;}
#panel{
width:260px;
background:#1b1a16;
padding:10px;
border:1px solid #3a3528;
}
#log{
height:200px;
overflow:auto;
background:#0b0b0b;
padding:6px;
margin-top:10px;
font-size:13px;
}
.version{
position:fixed;
bottom:5px;
right:10px;
opacity:0.6;
font-size:12px;
}
</style>
</head>
<body>

<h1>Crônicas de Eldoria</h1>

<div id="game">

<div id="map"></div>

<div id="panel">
<div>HP: <span id="hp"></span></div>
<div>Força: <span id="str"></span></div>
<div>Ouro: <span id="gold"></span></div>

<hr>

<div>Inventário:</div>
<div id="inv"></div>

<hr>

<div>Controles:</div>
<div>WASD ou Setas</div>

<div id="log"></div>
</div>

</div>

<div class="version">proto 0.4</div>

<script>

const size=20
let map=[]
let enemies=[]
let items=[]

let player={
x:10,
y:10,
hp:100,
str:5,
gold:0,
inv:[]
}

function log(t){
let box=document.getElementById("log")
box.innerHTML+=t+"<br>"
box.scrollTop=box.scrollHeight
}

function createMap(){

for(let y=0;y<size;y++){
map[y]=[]
for(let x=0;x<size;x++){

let r=Math.random()

if(r<0.1){
map[y][x]="tree"
}else{
map[y][x]="grass"
}

}
}

}

function spawnEnemies(){

for(let i=0;i<6;i++){

enemies.push({
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size),
hp:20
})

}

}

function spawnItems(){

for(let i=0;i<5;i++){

items.push({
x:Math.floor(Math.random()*size),
y:Math.floor(Math.random()*size),
type:"gold"
})

}

}

function draw(){

const mapDiv=document.getElementById("map")
mapDiv.innerHTML=""

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let tile=document.createElement("div")
tile.className="tile "+map[y][x]

if(player.x===x && player.y===y){
tile.className="tile player"
tile.innerText="🙂"
}

enemies.forEach(e=>{
if(e.x===x && e.y===y){
tile.className="tile enemy"
tile.innerText="🐺"
}
})

items.forEach(i=>{
if(i.x===x && i.y===y){
tile.className="tile item"
tile.innerText="💰"
}
})

mapDiv.appendChild(tile)

}
}

updatePanel()

}

function updatePanel(){

document.getElementById("hp").innerText=player.hp
document.getElementById("str").innerText=player.str
document.getElementById("gold").innerText=player.gold

let inv=document.getElementById("inv")
inv.innerHTML=""
player.inv.forEach(i=>{
let d=document.createElement("div")
d.innerText=i
inv.appendChild(d)
})

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(nx<0||ny<0||nx>=size||ny>=size)return
if(map[ny][nx]=="tree")return

player.x=nx
player.y=ny

checkItems()
checkEnemies()

draw()

}

function checkItems(){

items=items.filter(i=>{

if(i.x===player.x && i.y===player.y){

player.gold+=10
player.inv.push("moeda antiga")
log("Você encontrou ouro!")

return false

}

return true

})

}

function checkEnemies(){

enemies.forEach(e=>{

if(e.x===player.x && e.y===player.y){

combat(e)

}

})

}

function combat(enemy){

log("Um lobo ataca!")

let dmg=player.str+Math.floor(Math.random()*5)

enemy.hp-=dmg

log("Você causa "+dmg)

if(enemy.hp<=0){

log("Lobo morto")

player.gold+=15

enemies=enemies.filter(x=>x!==enemy)

}else{

player.hp-=5
log("Você sofre 5 dano")

}

if(player.hp<=0){
alert("Você morreu")
location.reload()
}

}

function moveEnemies(){

enemies.forEach(e=>{

let dx=Math.floor(Math.random()*3)-1
let dy=Math.floor(Math.random()*3)-1

let nx=e.x+dx
let ny=e.y+dy

if(nx>=0&&ny>=0&&nx<size&&ny<size){
if(map[ny][nx]!=="tree"){
e.x=nx
e.y=ny
}
}

})

draw()

}

document.addEventListener("keydown",e=>{

if(e.key=="w"||e.key=="ArrowUp")move(0,-1)
if(e.key=="s"||e.key=="ArrowDown")move(0,1)
if(e.key=="a"||e.key=="ArrowLeft")move(-1,0)
if(e.key=="d"||e.key=="ArrowRight")move(1,0)

})

createMap()
spawnEnemies()
spawnItems()
draw()

setInterval(moveEnemies,1200)

log("Bem-vindo a Eldoria.")

</script>

</body>
</html>
