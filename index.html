<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Crônicas de Eldoria</title>

<style>

body{
background:#0f0e0c;
font-family:Georgia,serif;
color:#e6dcc6;
margin:0;
}

h1{
text-align:center;
color:#c6a85a;
}

.version{
position:fixed;
bottom:5px;
right:10px;
opacity:0.6;
font-size:12px;
}

#game{
width:95%;
max-width:1500px;
margin:auto;
display:grid;
grid-template-columns:280px 1fr 280px;
gap:15px;
}

.panel{
background:#1b1a16;
border:1px solid #3a3528;
border-radius:8px;
padding:12px;
}

#world{
height:420px;
background:linear-gradient(#2a261c,#15130e);
border-radius:10px;
position:relative;
overflow:hidden;
margin-bottom:10px;
}

.player{
width:60px;
height:90px;
background:#c6a85a;
position:absolute;
bottom:70px;
left:45%;
}

.enemy{
width:60px;
height:90px;
background:#7a1f1f;
position:absolute;
bottom:70px;
right:25%;
}

.ground{
position:absolute;
bottom:0;
height:110px;
width:100%;
background:#3a3426;
transform:perspective(400px) rotateX(55deg);
}

button{
width:100%;
margin-top:5px;
padding:8px;
background:#2c2920;
border:1px solid #4a4432;
color:#e6dcc6;
cursor:pointer;
}

button:hover{
background:#3c372a;
}

#log{
height:260px;
overflow:auto;
background:#0b0b0b;
padding:8px;
border-radius:6px;
font-size:14px;
}

#inventory{
min-height:120px;
}

</style>
</head>

<body>

<h1>Crônicas de Eldoria</h1>

<div id="game">

<div class="panel">

<h3>Personagem</h3>

<div>HP: <span id="hp"></span></div>
<div>Nível: <span id="level"></span></div>
<div>XP: <span id="xp"></span></div>
<div>Força: <span id="str"></span></div>
<div>Mente: <span id="mind"></span></div>
<div>Ouro: <span id="gold"></span></div>

<hr>

<div>Origem: <span id="origin"></span></div>
<div>Poder: <span id="ability"></span></div>

<hr>

<div>Vila: <span id="repVillage"></span></div>
<div>Nobreza: <span id="repNoble"></span></div>
<div>Corrupção: <span id="corruption"></span></div>

</div>

<div class="panel">

<div id="world">

<div class="ground"></div>
<div class="player"></div>
<div id="enemyBox"></div>

</div>

<div id="story"></div>

<div id="choices"></div>

</div>

<div class="panel">

<h3>Inventário</h3>

<div id="inventory"></div>

<hr>

<h3>Mapa</h3>

<button onclick="goLocation('vila')">Vila</button>
<button onclick="goLocation('floresta')">Floresta</button>
<button onclick="goLocation('ruinas')">Ruínas</button>
<button onclick="goLocation('cidade')">Cidade</button>

<hr>

<h3>Crônicas</h3>

<div id="log"></div>

</div>

</div>

<div class="version">version 2.0</div>

<script>

let player={

hp:100,
level:1,
xp:0,

str:5,
mind:5,

gold:20,

origin:"",
ability:"",

repVillage:0,
repNoble:0,
corruption:0,

inventory:[]

}

function saveGame(){

localStorage.setItem("isekaiSave",JSON.stringify(player))

}

function loadGame(){

let save=localStorage.getItem("isekaiSave")

if(save){
player=JSON.parse(save)
}

}

function log(t){

let box=document.getElementById("log")

box.innerHTML+=t+"<br>"

box.scrollTop=box.scrollHeight

}

function update(){

document.getElementById("hp").innerText=player.hp
document.getElementById("level").innerText=player.level
document.getElementById("xp").innerText=player.xp
document.getElementById("str").innerText=player.str
document.getElementById("mind").innerText=player.mind
document.getElementById("gold").innerText=player.gold

document.getElementById("origin").innerText=player.origin
document.getElementById("ability").innerText=player.ability

document.getElementById("repVillage").innerText=player.repVillage
document.getElementById("repNoble").innerText=player.repNoble
document.getElementById("corruption").innerText=player.corruption

renderInventory()

saveGame()

}

function renderInventory(){

let box=document.getElementById("inventory")

box.innerHTML=""

player.inventory.forEach(item=>{

let div=document.createElement("div")

div.innerText=item

box.appendChild(div)

})

}

function addItem(item){

player.inventory.push(item)

log("Item encontrado: "+item)

}

function gainXP(x){

player.xp+=x

if(player.xp>=100){

player.level++

player.xp=0

player.str+=1
player.mind+=1

log("Você subiu de nível!")

}

}

function clearChoices(){

document.getElementById("choices").innerHTML=""

}

function addChoice(t,a){

let btn=document.createElement("button")

btn.innerText=t
btn.onclick=a

document.getElementById("choices").appendChild(btn)

}

function spawnEnemy(){

document.getElementById("enemyBox").innerHTML='<div class="enemy"></div>'

}

function clearEnemy(){

document.getElementById("enemyBox").innerHTML=""

}

function combat(name,hp,dmg){

clearChoices()

spawnEnemy()

document.getElementById("story").innerText=name+" aparece!"

addChoice("Atacar",function(){

let damage=player.str+Math.floor(Math.random()*6)

hp-=damage

log("Você causa "+damage)

if(hp<=0){

clearEnemy()

log(name+" derrotado!")

player.gold+=15

gainXP(30)

update()

mainMenu()

}else{

player.hp-=dmg

log(name+" causa "+dmg)

update()

checkDeath()

combat(name,hp,dmg)

}

})

addChoice("Fugir",function(){

clearEnemy()

mainMenu()

})

}

function randomEvent(){

let events=[

function(){

combat("Lobo",40,7)

},

function(){

player.gold+=15

log("Você encontra moedas antigas.")

},

function(){

addItem("Poção")

},

function(){

player.str+=1
log("Treinamento improvisado aumenta força.")

},

function(){

player.mind+=1
log("Você encontra um livro antigo.")

}

]

let e=events[Math.floor(Math.random()*events.length)]

e()

update()

}

function goLocation(loc){

clearChoices()

if(loc=="floresta"){

document.getElementById("story").innerText="Você entra na floresta."

randomEvent()

}

if(loc=="vila"){

document.getElementById("story").innerText="A vila está calma."

player.repVillage+=1

log("Moradores confiam mais em você.")

update()

mainMenu()

}

if(loc=="cidade"){

document.getElementById("story").innerText="Intrigas na cidade."

player.repNoble+=1
player.gold+=10

log("Um nobre paga por sua ajuda.")

update()

mainMenu()

}

if(loc=="ruinas"){

document.getElementById("story").innerText="Ruínas antigas."

combat("Guardião Antigo",60,10)

}

}

function mainMenu(){

clearChoices()

document.getElementById("story").innerText="O que deseja fazer?"

addChoice("Explorar evento",randomEvent)

addChoice("Treinar",function(){

player.str+=1
player.mind+=1

log("Treinamento melhora atributos.")

update()

})

}

function checkDeath(){

if(player.hp<=0){

alert("Você morreu.")

localStorage.removeItem("isekaiSave")

location.reload()

}

}

function generateOrigin(){

let list=["Ferreiro","Nobre Caído","Mercenário","Invocação Falha"]

player.origin=list[Math.floor(Math.random()*list.length)]

}

function generateAbility(){

let list=["Drenar Vida","Olhos do Futuro","Contrato Sombrio"]

player.ability=list[Math.floor(Math.random()*list.length)]

}

function start(){

loadGame()

if(!player.origin){

generateOrigin()
generateAbility()

}

update()

log("Bem vindo a Eldoria.")

mainMenu()

}

start()

</script>

</body>
</html>
