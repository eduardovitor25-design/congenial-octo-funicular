<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Isekai Procedural RPG - Alfa 0.5</title>

<style>
body{
    background:linear-gradient(#0f0f0f,#1a1a1a);
    color:#eee;
    font-family:Georgia;
    padding:20px;
}
#game{
    max-width:900px;
    margin:auto;
    background:#1c1c1c;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px #000;
}
h2{color:#c9a94f;}
.stats{
    background:#111;
    padding:10px;
    margin-bottom:15px;
    border-radius:8px;
}
button{
    margin:6px;
    padding:10px 14px;
    background:#2e2e2e;
    color:#fff;
    border:none;
    cursor:pointer;
    border-radius:6px;
}
button:hover{
    background:#444;
}
.log{
    background:#000;
    padding:10px;
    height:180px;
    overflow-y:auto;
    margin-top:10px;
    font-size:14px;
}
.section{
    margin-bottom:15px;
}
</style>
</head>

<body>

<div id="game">
<h2>🌌 Crônicas do Isekai Procedural</h2>

<div class="stats">
❤️ HP: <span id="hp"></span> |
⚔ Força: <span id="str"></span> |
🧠 Mente: <span id="mind"></span> |
💰 Ouro: <span id="gold"></span> |
⭐ Reputação Vila: <span id="repVillage"></span> |
🏰 Reputação Nobreza: <span id="repNoble"></span> |
🌑 Corrupção: <span id="corruption"></span>
</div>

<div class="section" id="story"></div>
<div class="section" id="choices"></div>
<div class="log" id="log"></div>
</div>

<script>
let player = {
    hp: 100,
    str: 0,
    mind: 0,
    gold: 20,
    repVillage: 0,
    repNoble: 0,
    corruption: 0,
    ability: "",
    origin: ""
};

function randomRange(min,max){
    return Math.floor(Math.random()*(max-min+1))+min;
}

function log(text){
    let box=document.getElementById("log");
    box.innerHTML+=text+"<br>";
    box.scrollTop=box.scrollHeight;
}

function update(){
    document.getElementById("hp").innerText=player.hp;
    document.getElementById("str").innerText=player.str;
    document.getElementById("mind").innerText=player.mind;
    document.getElementById("gold").innerText=player.gold;
    document.getElementById("repVillage").innerText=player.repVillage;
    document.getElementById("repNoble").innerText=player.repNoble;
    document.getElementById("corruption").innerText=player.corruption;
}

function clearChoices(){
    document.getElementById("choices").innerHTML="";
}

function addChoice(text,action){
    let btn=document.createElement("button");
    btn.innerText=text;
    btn.onclick=action;
    document.getElementById("choices").appendChild(btn);
}

function generateOrigin(){
    let origins=[
        "Filho de Ferreiro",
        "Nobre Arruinado",
        "Mercenário Desertor",
        "Invocação Falha",
        "Bastardo da Corte",
        "Camponês Endividado"
    ];
    player.origin=origins[randomRange(0,origins.length-1)];
    player.str=randomRange(4,8);
    player.mind=randomRange(4,8);
}

function generateAbility(){
    let abilities=[
        "Roubar Vida (cura ao causar dano)",
        "Contrato Forçado (chance de controlar NPC)",
        "Olhar do Futuro (evita falha uma vez)",
        "Fúria Sombria (+dano, +corrupção)"
    ];
    player.ability=abilities[randomRange(0,abilities.length-1)];
}

function start(){
    generateOrigin();
    generateAbility();
    update();
    log("Origem: "+player.origin);
    log("Habilidade: "+player.ability);
    mainMenu();
}

function mainMenu(){
    clearChoices();
    document.getElementById("story").innerText=
    "Você está na região fronteiriça de Eldoria. O que deseja fazer?";

    addChoice("Explorar Floresta",forest);
    addChoice("Ir à Cidade",city);
    addChoice("Aceitar Missão da Vila",villageQuest);
    addChoice("Praticar Habilidade",useAbility);
}

function forest(){
    clearChoices();
    let roll=Math.random();

    if(roll<0.4){
        document.getElementById("story").innerText="Um Lobo Selvagem ataca!";
        combat("Lobo",40,6);
    }else if(roll<0.7){
        document.getElementById("story").innerText="Você encontra um mercador suspeito.";
        addChoice("Roubar",function(){
            player.gold+=30;
            player.corruption+=10;
            log("Você roubou o mercador.");
            update();
            mainMenu();
        });
        addChoice("Negociar",function(){
            player.gold-=5;
            player.repVillage+=2;
            log("Negociação honesta.");
            update();
            mainMenu();
        });
    }else{
        document.getElementById("story").innerText="Você encontra ruínas antigas.";
        player.mind+=1;
        log("Conhecimento adquirido.");
        update();
        mainMenu();
    }
}

function combat(name,hp,dmg){
    clearChoices();
    addChoice("Atacar",function(){
        let damage=player.str+randomRange(1,6);
        hp-=damage;
        log("Você causa "+damage+" de dano.");

        if(hp<=0){
            player.gold+=20;
            player.repVillage+=1;
            log(name+" derrotado!");
            update();
            mainMenu();
        }else{
            player.hp-=dmg;
            log(name+" causa "+dmg+" de dano.");
            update();
            checkDeath();
            combat(name,hp,dmg);
        }
    });

    addChoice("Usar Habilidade",function(){
        if(player.ability=="Fúria Sombria (+dano, +corrupção)"){
            let damage=player.str+15;
            hp-=damage;
            player.corruption+=5;
            log("Fúria ativa! "+damage+" dano.");
        }else if(player.ability=="Roubar Vida (cura ao causar dano)"){
            let damage=player.str+5;
            hp-=damage;
            player.hp+=damage/2;
            log("Vida drenada.");
        }
        update();
        if(hp<=0){
            log(name+" caiu.");
            mainMenu();
        }else{
            player.hp-=dmg;
            update();
            checkDeath();
            combat(name,hp,dmg);
        }
    });

    addChoice("Fugir",mainMenu);
}

function city(){
    clearChoices();
    document.getElementById("story").innerText="Na cidade há intrigas políticas.";
    addChoice("Apoiar Nobre",function(){
        player.repNoble+=3;
        player.gold+=15;
        log("Você ajudou um nobre.");
        update();
        mainMenu();
    });
    addChoice("Espionar",function(){
        player.mind+=1;
        player.corruption+=3;
        log("Segredos adquiridos.");
        update();
        mainMenu();
    });
}

function villageQuest(){
    clearChoices();
    document.getElementById("story").innerText="A vila pede ajuda contra bandidos.";
    addChoice("Ajudar",function(){
        combat("Bandido",50,8);
    });
    addChoice("Cobrar ouro antes",function(){
        player.gold+=10;
        player.repVillage-=2;
        log("Você exigiu pagamento.");
        update();
        mainMenu();
    });
}

function useAbility(){
    clearChoices();
    player.mind+=1;
    player.corruption+=2;
    log("Você sente sua habilidade crescer... mas algo escurece dentro de você.");
    update();
    mainMenu();
}

function checkDeath(){
    if(player.hp<=0){
        alert("Você morreu. O mundo continua sem você.");
        location.reload();
    }
}

start();
</script>

</body>
</html>
